<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chapter_01 (Alerts)</title>

        <!-- a. Head -->
        <script>
            alert("script in Head");
        </script>
    </head>
    <body>
        <!-- Question_06
        Make use of alerts in your new/existing HTML & CSS project. -->
        <!-- Answer: -->
        <script>
            alert("Welcome to our Website!");
        </script>


        <!-- Question_07
        Practice placement of <script></script> element in following sections of your project in exercise 6:
        a. Head
        b. Body (before your page’s HTML)
        c. Body (inside your page’s HTML)
        d. Body (after your page’s HTML) -->

        <!-- b. Body (before your page’s HTML) -->
        <script>
            alert("script before your page’s HTML");
        </script>

        <!-- Heading -->
        <h1>Welcome to our Website!</h1>

        <!-- c. Body (inside your page’s HTML) -->
        <script>
            alert("script inside your page’s HTML");
        </script>

        <!-- Paragraph -->
        <p>Lorem ipsum dolor sit amet consectetur.</p>

        <!-- d. Body (after your page’s HTML) -->
        <script>
            alert("script after your page’s HTML");
        </script>

        <script src="app.js"></script>
    </body>
</html>
